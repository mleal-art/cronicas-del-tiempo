cia estaba en bancarrota. El rey Luis XVI convocó a los Estados Generales —la asamblea representativa que no se reunía desde 1614— para resolver la crisis fiscal. Lo que nadie previó es que esa convocatoria abriría las compuertas de algo que no podría controlarse.\n\nEl Tercer Estado —los representantes del pueblo común, el 97% de la población— llegó con una agenda que iba mucho más allá de los impuestos. Querían reformas fundamentales: una constitución, igualdad ante la ley, fin de los privilegios nobiliarios, libertad de prensa. Cuando el rey intentó dispersarlos, se declararon Asamblea Nacional y juraron no disolverse hasta dar a Francia una constitución.\n\nEl 14 de julio de 1789, la muchedumbre parisiense tomó la Bastilla, la prisión real que era símbolo del despotismo. Solo había siete presos dentro, pero la importancia era simbólica: el pueblo había derrocado el miedo al poder real.\n\nLos primeros años de la Revolución fueron de reformas genuinas: se abolieron los privilegios feudales en una noche memorable de agosto de 1789, se declararon los derechos del hombre y del ciudadano, se nacionalizaron las tierras de la Iglesia. Pero la lógica de la revolución se fue radicalizando inexorablemente.\n\nLa guerra contra las potencias europeas que querían restaurar la monarquía, la amenaza interna de las contrarrevolucionarias, las conspiraciones reales e imaginarias, el hambre y la inflación —todo se combinó para crear las condiciones del Terror.\n\nMaximilien Robespierre era abogado de provincias, conocido antes de la revolución como 'el incorruptible' por su austeridad personal y su defensa de los pobres. Se convirtió en el rostro del Comité de Seguridad Pública y del período más sangriento de la revolución. Bajo la lógica que él articuló —el terror es la justicia, la virtud sin terror es impotente— la guillotina trabajó sin descanso.\n\nEntre septiembre de 1793 y julio de 1794, más de 17.000 personas fueron ejecutadas oficialmente. Decenas de miles más murieron en prisiones o en las represiones en provincias. Nobles, sacerdotes, aristócratas, pero también revolucionarios acusados de ser demasiado moderados o demasiado extremos —todos podían terminar ante la guillotina con apenas una acusación.\n\nEl 27 de julio de 1794, termidor en el calendario revolucionario, sus propios colegas del Comité arrestaron a Robespierre. Al día siguiente fue ejecutado sin juicio. La ironía fue perfecta: el arquitecto del Terror murió víctima de las mismas reglas que él había establecido.\n\nLa Revolución Francesa dejó un legado paradójico: inventó la democracia moderna, los derechos civiles, el Estado laico y el concepto de soberanía popular. Y también demostró cómo esos mismos principios podían ser usados para justificar el totalitarismo y el terror.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Execution_of_Louis_XVI.jpg/800px-Execution_of_Louis_XVI.jpg"}, {"id": "world_05", "type": "world", "title": "Nokia: El Gigante que Perdió el Futuro en sus Manos", "subtitle": "Nokia Corporation, 1998-2013", "period": "1998-2013", "civilization": "Nokia Corporation, Finlandia", "imageQuery": "Nokia mobile phone history Finland technology", "didYouKnow": "Nokia tuvo su propio prototipo de smartphone con pantalla táctil en 1996, once años antes que el iPhone. El proyecto fue abandonado internamente porque la empresa consideró que el mercado no estaba listo. El mismo ingeniero que lideró ese proyecto fue contratado por Apple años después.", "content": "En 1998, Nokia era la empresa más valiosa de Europa. Sus teléfonos celulares controlaban el 40% del mercado mundial. El Nokia 3310 se convirtió en el objeto más vendido de la historia de la electrónica de consumo hasta ese momento, con 126 millones de unidades vendidas. En Finlandia, un país de 5 millones de habitantes, Nokia representaba el 4% del PIB nacional y el 70% de la capitalización total de la bolsa de Helsinki.\n\nEra una historia de transformación extraordinaria: Nokia había sido fundada en 1865 como fábrica de papel. Luego fabricó botas de goma. Luego cables eléctricos. Luego electrónica de consumo. Había llegado al mundo de las telecomunicaciones casi por accidente y se había convertido en la empresa más innovadora del mundo en su campo.\n\nPero dentro de Nokia, algo comenzó a fallar silenciosamente en los años 2000. La empresa era tan grande, tan exitosa, tan admirada, que desarrolló una cultura interna que priorizaba la preservación del éxito existente sobre la experimentación con lo nuevo. Los ingenieros que proponían ideas radicales eran frenados por gerentes que se preguntaban si eso dañaría las ventas de los modelos actuales.\n\nNokia tenía la tecnología para inventar el smartphone. Tenía ingenieros brillantes. Tenía el capital. Tenía el acceso a los operadores telefónicos de todo el mundo. Tenía, de hecho, prototipos de teléfonos con pantallas táctiles y acceso a internet desde mediados de los 90. Pero la estructura organizacional y la cultura interna hacían imposible llevar esas ideas al mercado con la velocidad y radicalidad necesarias.\n\nCuando Steve Jobs presentó el iPhone en enero de 2007, los ejecutivos de Nokia que vieron la presentación en tiempo real desde Finlandia reaccionaron con una mezcla de preocupación y desdén. El iPhone no tenía teclado físico, que Nokia consideraba esencial. No tenía buena batería. No tenía 3G. Era imperfecto en muchas de las métricas que Nokia usaba para medir un buen teléfono.\n\nTenían razón en los detalles y estaban equivocados en lo fundamental: el iPhone no era un teléfono mejorado. Era un ordenador de bolsillo que también hacía llamadas. El campo de juego había cambiado completamente.\n\nGoogle lanzó Android en 2008, dando a los fabricantes una plataforma abierta para competir. Samsung, HTC, LG —todos adoptaron Android y comenzaron a ganar el mercado que Nokia dominaba. En 2011, Nokia anunció que abandonaría su propio sistema operativo y adoptaría Windows Phone de Microsoft. El mercado lo interpretó correctamente como una señal de rendición.\n\nEn 2013, Microsoft compró la división de móviles de Nokia por 7.200 millones de dólares. Tres años después, Microsoft abandonó esa división con pérdidas masivas. El nombre Nokia sobrevivió, licenciado a otras empresas para fabricar teléfonos que son respetables pero completamente irrelevantes en el mercado que Nokia una vez dominó.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Nokia_3310_Blue.jpg/800px-Nokia_3310_Blue.jpg"}, {"id": "world_06", "type": "world", "title": "La Batalla de Termopilas: Trescientos contra el Mundo", "subtitle": "Grecia, 480 a.C.", "period": "480 a.C.", "civilization": "Esparta y las ciudades-estado griegas vs. Imperio Persa", "imageQuery": "Battle Thermopylae Leonidas Spartans Persians ancient Greece", "didYouKnow": "El paso de las Termopilas debe su nombre a las fuentes de agua caliente que había en la zona. En griego, Thermopylai significa literalmente 'puertas calientes'. En la época de la batalla, era un paso muy angosto entre el mar y las montañas que los griegos utilizaron estratégicamente.", "content": "El rey persa Jerjes reunió el ejército más grande que el mundo antiguo había visto jamás. Las fuentes griegas hablan de un millón o más de soldados; los historiadores modernos estiman entre 100.000 y 300.000. Cruzó el Helesponto con un puente de barcos, invadió el norte de Grecia y avanzó hacia el sur con el objetivo de destruir Atenas y someter toda Grecia al Imperio Persa.\n\nLas ciudades-estado griegas sabían que no podían enfrentarlo en campo abierto. Necesitaban un lugar donde la superioridad numérica de Persia fuera irrelevante. Lo encontraron en el paso de las Termopilas: un corredor entre las montañas y el mar que en algunos puntos no tenía más de quince metros de ancho. Allí, cualquier número de soldados que llegara tenía que reducirse al ancho del paso.\n\nEl rey espartano Leónidas llegó al paso con apenas 300 espartanos de su guardia personal y unos 6.000 aliados de otras ciudades griegas. Frente a él, el ejército más poderoso del mundo conocido.\n\nLos espartanos eran la elite militar más entrenada de la Antigüedad. Desde los siete años, los niños espartanos vivían en cuarteles militares, sometidos a un entrenamiento físico y psicológico brutal. Leónidas eligió para esta misión solo a hombres que ya tenían hijos, porque sabía que probablemente ninguno volvería.\n\nDurante dos días, los griegos resistieron oleadas de atacantes persas en el paso estrecho. Los inmortales, la guardia de élite de Jerjes, fueron rechazados con pérdidas enormes. Los persas morían en montones frente a las lanzas griegas sin poder usar su ventaja numérica.\n\nFue la traición lo que cambió el curso. Un lugareño llamado Efialtes le mostró a Jerjes un sendero de montaña que rodeaba el paso. Cuando Leónidas supo que los persas llegarían por detrás en horas, tomó la decisión de liberar a la mayoría de los aliados griegos y quedarse con sus 300 espartanos más un contingente de tebanos y tespienses para cubrirles la retirada.\n\nLa tercera mañana, los 300 espartanos sabían que morirían. Desayunaron como si nada, se peinaron el cabello —costumbre espartana antes del combate— y esperaron. Cuando llegaron los persas desde el frente y desde la retaguardia simultáneamente, los espartanos salieron del paso y combatieron en campo abierto, buscando la muerte cara a cara.\n\nMurieron todos. Jerjes, furioso por las pérdidas que le habían costado y por el desafío a su autoridad divina, ordenó decapitar el cuerpo de Leónidas y clavarle la cabeza en una pica. Era el mayor insulto que un rey persa podía hacer a un enemigo muerto.\n\nPero las Termopilas habían dado tiempo suficiente a los griegos para evacuar Atenas y preparar la batalla naval de Salamina, donde la flota persa sería destruida. El sacrificio de los 300 no ganó la guerra, pero la hizo posible ganar.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Jacques-Louis_David_-_Leonidas_at_Thermopylae.jpg/800px-Jacques-Louis_David_-_Leonidas_at_Thermopylae.jpg"}, {"id": "world_07", "type": "world", "title": "Samsung: De Pescado Seco a Imperio Tecnológico", "subtitle": "Samsung Group, 1938-presente", "period": "1938-presente", "civilization": "Samsung Group, Corea del Sur", "imageQuery": "Samsung electronics Korea history technology", "didYouKnow": "Samsung significa 'Tres Estrellas' en coreano. La empresa comenzó vendiendo pescado seco, fideos y frutas. Hoy Samsung es tan grande que representa aproximadamente el 20% del PIB exportador de Corea del Sur, y sus ventas anuales equivalen a casi el 20% de la economía total del país.", "content": "En 1938, en la ciudad de Suwon, Corea del Sur —entonces bajo ocupación japonesa— un joven emprendedor llamado Lee Byung-chul fundó una pequeña empresa comercial con capital de 30.000 wones. El nombre era Samsung, 'Tres Estrellas'. Vendía pescado seco, fideos y frutas a China. Nadie podría haber predicho que ese modesto negocio se convertiría en uno de los conglomerados más grandes del mundo.\n\nLa historia de Samsung es inseparable de la historia de Corea del Sur, y ambas son historias de transformación extraordinaria en tiempo récord. Cuando terminó la Guerra de Corea en 1953, el país estaba en ruinas, con un PBI per cápita comparable al de las naciones más pobres de África. Setenta años después, Corea del Sur es la décima economía del mundo.\n\nSamsung creció con el país. En los años 50 entró al negocio de los seguros y el azúcar. En los 60 a los textiles. En los 70, Lee Byung-chul, inspirado por las visitas a las fábricas japonesas de Sharp y Sanyo, tomó la decisión de entrar a la electrónica de consumo. El gobierno coreano lo apoyó con protección arancelaria y préstamos blandos dentro de la política de desarrollo industrial planificado del presidente Park Chung-hee.\n\nLas primeras televisiones Samsung de los años 70 eran copias descaradas de productos japoneses. Los ingenieros visitaban fábricas de Sony y Matsushita, estudiaban los productos, y los replicaban con mano de obra más barata. Era una estrategia de aprendizaje deliberado que los japoneses habían usado con los americanos décadas antes.\n\nEl salto cualitativo llegó en los años 90 cuando Samsung decidió invertir masivamente en investigación y desarrollo propia. La crisis financiera asiática de 1997 fue paradójicamente el catalizador: mientras sus competidores japoneses se paralizaban, Samsung apostó por el futuro. Invirtió miles de millones en chips de memoria, pantallas OLED y tecnología de semiconductores.\n\nLa relación con Apple fue su mayor paradoja. Samsung se convirtió en el principal proveedor de componentes del iPhone —chips, pantallas, memoria— mientras simultáneamente lanzaba sus propios smartphones Galaxy en competencia directa con Apple. Apple llegó a demandar a Samsung por copiar el diseño del iPhone, en uno de los litigios de propiedad intelectual más costosos de la historia tecnológica.\n\nHoy Samsung fabrica desde chips semiconductores hasta barcos, desde rascacielos hasta seguros de vida, pasando por televisiones, lavadoras, teléfonos y parques de atracciones. Es un chaebol —el término coreano para los conglomerados familiares que dominan la economía del país— de una escala que no tiene equivalente en ningún otro país democrático del mundo.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Samsung_Galaxy_S6.jpg/800px-Samsung_Galaxy_S6.jpg"}, {"id": "world_08", "type": "world", "title": "La Peste Negra: El Día que Europa Cambió para Siempre", "subtitle": "Europa y Asia, 1347-1351", "period": "1347-1351", "civilization": "Europa medieval", "imageQuery": "Black Death plague medieval Europe 1348 bubonic", "didYouKnow": "La Peste Negra mató entre el 30% y el 60% de la población europea en apenas cuatro años. En algunas ciudades como Florencia y Hamburgo, la mortalidad llegó al 60-70%. Como consecuencia inesperada, los sobrevivientes —que ahora eran escasos— pudieron exigir mejores salarios, acelerando el fin del feudalismo.", "content": "Llegó desde el este, siguiendo las rutas comerciales de la Seda. Los mercaderes genoveses que comerciaban en la ciudad de Caffa, en Crimea, vieron algo aterrador en 1346: el ejército mongol que los sitiaba comenzó a morir de una enfermedad desconocida. Los cuerpos se llenaban de bubones negros en las axilas y la ingle, la piel se tornaba oscura, la fiebre era devastadora, y la mayoría moría en días.\n\nDicen que los mongoles, antes de retirarse, catapultaron los cadáveres infectados sobre las murallas de la ciudad. Sea verdad o leyenda, los genoveses que escaparon en sus barcos llevaron la enfermedad consigo al Mediterráneo.\n\nEn octubre de 1347, doce barcos genoveses atracaron en el puerto de Messina, Sicilia. La mayoría de los marineros estaban muertos o agonizantes, cubiertos de bubones que supuraban sangre y pus. Las autoridades portuarias ordenaron que los barcos salieran del puerto inmediatamente. Era demasiado tarde.\n\nEn los cuatro años siguientes, la Peste Negra arrasó Europa con una velocidad y una brutalidad que ninguna generación había experimentado ni podía imaginar. El bacilo Yersinia pestis, transmitido principalmente por las pulgas de las ratas, avanzó de ciudad en ciudad, de aldea en aldea, a lo largo de las rutas comerciales y militares del continente.\n\nLas descripciones que dejaron los sobrevivientes son aterradoras. En Florencia, Giovanni Boccaccio vio morir a sus amigos y familiares y describió la escena en el prólogo al Decamerón: cadáveres abandonados en las calles, familias que huían dejando a sus enfermos solos, perros y cerdos que se comían los cuerpos, las campanas de las iglesias que sonaban sin parar día y noche.\n\nLa medicina de la época no tenía ninguna explicación ni ningún remedio efectivo. La teoría predominante era que la enfermedad se transmitía por el 'miasma' —el aire corrupto— de los lugares donde había muertos. Las autoridades quemaban las pertenencias de los fallecidos. Los médicos usaban máscaras en forma de pico de pájaro rellenas de hierbas aromáticas para protegerse del aire maloliente.\n\nLas consecuencias sociales fueron cataclísmicas y en algunos casos inesperadamente transformadoras. La Iglesia, que había prometido protección divina a cambio de devoción, vio su autoridad gravemente dañada cuando los sacerdotes morían igual que los pecadores. Los judíos fueron masacrados en docenas de ciudades europeas, acusados de envenenar los pozos —un pretexto para la violencia antisemita que tenía causas más profundas.\n\nPero también hubo consecuencias positivas no buscadas. Con un tercio o más de la población muerta, la mano de obra se volvió escasa y valiosa. Los campesinos sobrevivientes pudieron exigir mejores condiciones, salarios más altos, y en muchos lugares la servidumbre feudal comenzó su declive. La crisis forzó una reevaluación de las estructuras sociales que había estado pendiente durante siglos.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Danse_macabre_by_Michael_Wolgemut.jpg/800px-Danse_macabre_by_Michael_Wolgemut.jpg"}, {"id": "world_09", "type": "world", "title": "IBM y la PC: Cómo un Gigante Regaló su Futuro", "subtitle": "IBM Corporation, 1980-1990", "period": "1980-1990", "civilization": "IBM Corporation", "imageQuery": "IBM PC personal computer 1981 history technology", "didYouKnow": "El ejecutivo de IBM que negoció con Bill Gates el contrato para el DOS no sabía que Gates no tenía el software cuando firmaron. Gates compró el sistema operativo QDOS a una empresa pequeña de Seattle por 75.000 dólares y lo licenció a IBM. Esa decisión hizo de Microsoft la empresa más valiosa del mundo durante décadas.", "content": "En 1980, IBM era la empresa tecnológica más poderosa del mundo. Sus mainframes —enormes ordenadores del tamaño de una habitación— gobernaban los centros de cómputo de los grandes bancos, gobiernos y corporaciones. IBM era sinónimo de computación seria, confiable, profesional. Sus trajes azules y su cultura de procesos eran el modelo empresarial que todo el mundo imitaba.\n\nPero Apple había lanzado el Apple II en 1977 y estaba creando un mercado completamente nuevo: el ordenador personal para el hogar y la pequeña empresa. IBM, que había ignorado ese mercado, comenzó a preocuparse. Necesitaba una respuesta rápida.\n\nEn agosto de 1980, el presidente de IBM, Frank Cary, autorizó un proyecto secreto y completamente inusual para la empresa: desarrollar un ordenador personal en tiempo récord, usando partes disponibles en el mercado en lugar del hardware propietario que IBM normalmente fabricaba. El equipo, llamado 'Proyecto Acorn', tenía un año para sacar un producto.\n\nPara el software del sistema operativo, el equipo de IBM fue a hablar con Gary Kildall, el creador del CP/M, el sistema operativo más usado en los microordenadores de la época. La reunión es una de las más famosas —y más debatidas— de la historia tecnológica: Kildall no estaba disponible ese día, su esposa atendió a los ejecutivos de IBM, las negociaciones fracasaron por razones que los protagonistas describen de maneras contradictorias.\n\nEl equipo de IBM fue entonces a ver a un joven emprendedor de 25 años en Seattle llamado Bill Gates. Gates tenía una empresa pequeña llamada Microsoft que hacía lenguajes de programación para microordenadores. Lo que Gates no tenía era un sistema operativo. Pero era brillante, audaz y entendió inmediatamente la magnitud del contrato que IBM le estaba ofreciendo.\n\nFue a ver a Tim Paterson, un programador de Seattle que había creado un sistema operativo llamado QDOS —Quick and Dirty Operating System— para uso propio. Gates compró los derechos por 75.000 dólares, lo renombró MS-DOS, y lo licenció a IBM. El detalle crucial: Gates negoció conservar el derecho de licenciar MS-DOS a otros fabricantes. IBM, que nunca imaginó que otros fabricarían ordenadores compatibles con el suyo, aceptó.\n\nFue el error estratégico más costoso de la historia corporativa. La IBM PC fue un éxito masivo cuando se lanzó en agosto de 1981. Pero al usar componentes estándar y un sistema operativo que IBM no controlaba, había creado una arquitectura que cualquiera podía copiar. En dos años, docenas de fabricantes —Compaq, HP, Dell, Acer— lanzaron 'clones de PC' compatibles y más baratos.\n\nMicrosoft cobró licencia de MS-DOS a cada uno de ellos. IBM perdió el control del mercado que había creado. El estándar de la industria pasó a ser 'compatible con IBM', no 'IBM'. Y Bill Gates se convirtió en el hombre más rico del mundo.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/IBM_PC_5150.jpg/800px-IBM_PC_5150.jpg"}, {"id": "world_10", "type": "world", "title": "Cleopatra: La Última Reina del Mundo Antiguo", "subtitle": "Egipto, 69-30 a.C.", "period": "69-30 a.C.", "civilization": "Egipto ptolemaico", "imageQuery": "Cleopatra Egypt ancient queen Alexandria", "didYouKnow": "Cleopatra era griega, no egipcia étnica. Era de la dinastía ptolemaica fundada por un general de Alejandro Magno. Era la primera de su dinastía en aprender el egipcio antiguo —sus predecesores, en 300 años de gobierno, nunca habían aprendido el idioma de sus súbditos. También hablaba otros siete idiomas.", "content": "La imagen popular de Cleopatra —creada por el cine del siglo XX— es la de una mujer de belleza sobrenatural que sedujo a dos de los hombres más poderosos de Roma para preservar su trono. La realidad es considerablemente más interesante y más compleja.\n\nCleopatra VII Filopátor tenía dieciocho años cuando subió al trono de Egipto en el año 51 a.C., junto a su hermano menor Ptolomeo XIII, de diez años, con quien estaba obligada por las tradiciones de la dinastía a casarse —en nombre únicamente, tratándose de su hermano. Gobernó en la Alejandría que era entonces la ciudad más cosmopolita y culturalmente rica del mundo mediterráneo, sede de la mayor biblioteca de la Antigüedad.\n\nLo que los historiadores modernos enfatizan sobre Cleopatra es su inteligencia excepcional y su preparación política. Hablaba nueve idiomas, incluyendo el egipcio antiguo —primera de su dinastía en hacerlo en trescientos años de gobierno extranjero. Estudió filosofía, matemática y astronomía en el Mouseion, la institución académica adjunta a la Biblioteca de Alejandría. Era una estratega política de primera línea.\n\nCuando Julio César llegó a Alejandría en el 48 a.C., persiguiendo a su rival Pompeyo, Cleopatra había sido depuesta por su hermano y estaba en el exilio. Según el relato famoso, se hizo enrollar en una alfombra o saco de ropa de cama y así fue introducida de contrabando al palacio para encontrarse con César. El encuentro fue decisivo: César la vio, escuchó su propuesta política y se alió con ella.\n\nLo que vino a continuación fue una guerra de sucesión en Alejandría en la que César apoyó a Cleopatra contra su hermano. Ptolomeo XIII murió ahogado en el Nilo mientras intentaba huir. Cleopatra recuperó el trono, y de su relación con César nació un hijo, Cesarión.\n\nCuando César fue asesinado en los Idus de marzo del 44 a.C., Cleopatra regresó a Egipto. Roma se dividió en guerras civiles. Cuando Marco Antonio se alió con Octavio y Lépido para dividir el mundo romano, Cleopatra entendió que necesitaba un nuevo aliado romano.\n\nEl encuentro con Marco Antonio en Tarso en el año 41 a.C. fue escenificado por Cleopatra como una entrada teatral de proporciones legendarias: llegó en un barco con velas de seda púrpura, remos de plata, y ella misma vestida como la diosa Afrodita, rodeada de niños disfrazados de cupidos. No era seducción simple —era diplomacia simbólica de altísimo nivel, diseñada para comunicar el poder y la riqueza de Egipto.\n\nLa alianza con Marco Antonio duró una década. Cuando Octavio los derrotó en la batalla de Actium en el año 31 a.C. y sus tropas marcharon hacia Alejandría, tanto Antonio como Cleopatra se suicidaron. Cleopatra tenía 39 años. Con su muerte terminó la última monarquía helenística y Egipto se convirtió en provincia romana.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Kleopatra-VII.-Altes-Museum-Berlin1.jpg/800px-Kleopatra-VII.-Altes-Museum-Berlin1.jpg"}, {"id": "world_11", "type": "world", "title": "Atari: El Imperio que Inventó los Videojuegos y se Destruyó Solo", "subtitle": "Atari Inc., 1972-1984", "period": "1972-1984", "civilization": "Atari Inc.", "imageQuery": "Atari 2600 video games 1980 history arcade", "didYouKnow": "El colapso de la industria de los videojuegos en 1983 fue tan severo en Estados Unidos que las acciones de todas las empresas del sector cayeron más del 97%. Millones de cartuchos de videojuegos fueron enterrados en un vertedero del desierto de Nuevo México — los legendarios 'cartuchos de E.T.' de Atari, encontrados por excavadoras en 2014.", "content": "En 1972, Nolan Bushnell y Ted Dabney fundaron Atari con 250 dólares en Santa Clara, California. Bushnell acababa de ver una demostración de un juego electrónico llamado Spacewar en un ordenador universitario y había tenido una visión: ese juego, adaptado para funcionar con monedas en un bar o una sala de juegos recreativos, podía ser un negocio extraordinario.\n\nEl primer producto de Atari fue Pong: una pantalla negra con dos barras blancas y un punto rebotando entre ellas, simulando el tenis de mesa. La mecánica era tan simple que se explicaba con una sola instrucción: 'Evita fallar el balón para alta puntuación.' En la máquina instalada en un bar de Sunnyvale, la moneda box se atascó después de dos semanas. Cuando Bushnell fue a revisarla, descubrió que se había atascado por exceso de monedas.\n\nAtari creció a una velocidad explosiva. En 1977 lanzó el Atari 2600, la primera consola doméstica con cartuchos intercambiables que permitían jugar distintos títulos en la misma máquina. Fue un éxito masivo. La Navidad de 1979, el juego Space Invaders fue el primer título que cuadruplicó las ventas de la consola que lo corría: la gente compraba el 2600 para jugar Space Invaders.\n\nEn 1980, Atari facturaba más de 2.000 millones de dólares anuales. Era la empresa de mayor crecimiento en la historia de la industria de bienes de consumo hasta ese momento. Warner Communications, que la había comprado en 1976, estaba encantada.\n\nPero el éxito creó los problemas. La cultura interna de Atari era caótica. Los programadores —llamados 'los magos' por sus habilidades casi mágicas para sacar rendimiento de hardware primitivo— eran pagados pobremente mientras la empresa generaba fortunas. Cuando Warner impuso una gestión corporativa clásica, los mejores programadores se fueron y fundaron sus propias empresas, entre ellas Activision, el primer desarrollador independiente de videojuegos de la historia.\n\nEl error fatal fue 1982. Atari pagó 21 millones de dólares para licenciar el juego basado en la película E.T. el extraterrestre, y encargó a un solo programador que lo desarrollara en cinco semanas —cuando un juego normal requería seis meses. El resultado fue uno de los peores videojuegos de la historia: confuso, aburrido, injugable. Se fabricaron 12 millones de cartuchos. Se vendieron 1,5 millones. El resto fue enterrado en un vertedero de Nuevo México.\n\nEn 1983, el mercado de videojuegos de Estados Unidos colapsó: de 3.200 millones de dólares en 1983 a 100 millones en 1985. Demasiados juegos malos, demasiados clones baratos, consumidores decepcionados. Atari fue vendida, dividida y relanzada múltiples veces. Nunca recuperó su gloria original.\n\nLa industria de los videojuegos se recuperó gracias a Nintendo, que en 1985 lanzó la NES con controles de calidad estrictos sobre los juegos publicados en su plataforma —exactamente la lección que Atari no había aprendido.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Atari-2600-Wood-4Sw-Set.jpg/800px-Atari-2600-Wood-4Sw-Set.jpg"}, {"id": "world_12", "type": "world", "title": "La Revolución Industrial: Cómo el Carbón Cambió la Humanidad", "subtitle": "Gran Bretaña, 1760-1840", "period": "1760-1840", "civilization": "Gran Bretaña", "imageQuery": "Industrial Revolution Britain steam engine factory 1800", "didYouKnow": "Antes de la Revolución Industrial, el crecimiento económico mundial había sido prácticamente cero durante siglos — la humanidad no se hacía más rica generación tras generación. La Revolución Industrial rompió esa tendencia de miles de años y comenzó el crecimiento económico sostenido que caracteriza al mundo moderno.", "content": "En el pequeño pueblo de Coalbrookdale, en el condado de Shropshire, Inglaterra, algo ocurrió en 1709 que cambiaría el mundo para siempre aunque nadie lo supo en ese momento. Abraham Darby I fundió hierro usando carbón de coque en lugar del carbón vegetal tradicional. Era un cambio técnico aparentemente menor. Fue el inicio de una transformación que haría al mundo irreconocible en un siglo.\n\nDurante miles de años, la economía humana había estado limitada por una restricción fundamental: toda la energía disponible provenía del sol, de manera directa o indirecta. Los músculos de hombres y animales funcionaban con alimentos que crecían con luz solar. Los molinos de viento y agua capturaban energía climática. La madera quemada era carbono vegetal que había absorbido luz solar en décadas recientes. La humanidad estaba, sin saberlo, atrapada dentro del ciclo solar presente.\n\nEl carbón mineral rompió esa barrera. Era energía solar acumulada durante millones de años, concentrada en una forma densa y disponible en enormes cantidades bajo el suelo inglés. Cuando James Watt perfeccionó la máquina de vapor entre 1763 y 1782, creó el mecanismo para convertir esa energía acumulada en movimiento mecánico.\n\nLo que siguió fue una cascada de innovaciones que se retroalimentaban mutuamente. Las máquinas de vapor necesitaban hierro para ser construidas. Para fabricar más hierro se necesitaban más máquinas de vapor para bombear el agua de las minas de carbón. El carbón y el hierro baratos permitieron construir ferrocarriles. Los ferrocarriles conectaron mercados que antes estaban aislados. Los mercados conectados daban incentivos para producir más. Para producir más se necesitaban máquinas. Las máquinas necesitaban ingenieros. Los ingenieros necesitaban escuelas.\n\nLas ciudades inglesas crecieron a una velocidad sin precedentes. Manchester, que en 1760 era un pueblo de 25.000 habitantes, tenía 300.000 en 1850. Birmingham, Liverpool, Leeds —todas explotaron demográficamente. Pero ese crecimiento tenía un costo humano enorme: los obreros trabajaban doce o catorce horas diarias en condiciones peligrosas, los niños de ocho o diez años trabajaban en las minas y las fábricas, las ciudades industriales eran insalubres y miserables.\n\nCharles Dickens escribió sobre esa miseria. Karl Marx la analizó y la sistematizó. Los movimientos sindicales comenzaron a organizarse para reclamar condiciones humanas de trabajo. Las leyes de fábricas empezaron a regular las horas de trabajo y a prohibir el trabajo infantil.\n\nLa Revolución Industrial fue la mayor transformación en la condición material humana desde la invención de la agricultura, diez mil años antes. En cien años, la humanidad pasó de un mundo que era esencialmente el mismo desde tiempos bíblicos a uno que ningún habitante del siglo XVIII podría haber imaginado.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Loom_in_a_cotton_factory.jpg/800px-Loom_in_a_cotton_factory.jpg"}, {"id": "world_13", "type": "world", "title": "Xerox PARC: El Laboratorio que Inventó el Futuro y No lo Aprovechó", "subtitle": "Xerox Corporation, 1970-1984", "period": "1970-1984", "civilization": "Xerox Corporation", "imageQuery": "Xerox PARC Alto computer mouse GUI invention 1973", "didYouKnow": "Cuando Steve Jobs visitó el PARC en 1979 y vio la interfaz gráfica con ratón, quedó tan impactado que casi no podía hablar. Más tarde diría que fue como ver el futuro. En los siguientes tres años, Apple lanzó el Lisa y luego el Macintosh basados en esos conceptos — y Xerox nunca capitalizó sus propias invenciones.", "content": "En 1970, Xerox era la empresa más rentable del mundo. Su negocio de fotocopiadoras era tan dominante que 'xeroxear' se había convertido en verbo sinónimo de fotocopiar en inglés. La empresa nadaba en dinero y decidió hacer algo inusual con él: crear el mejor laboratorio de investigación del mundo y darles a los científicos libertad total para trabajar en lo que quisieran.\n\nAsí nació el Palo Alto Research Center —PARC— en el corazón de lo que todavía no se llamaba Silicon Valley. El director de contratación, Bob Taylor, convenció a los mejores científicos informáticos de las universidades más prestigiosas de Estados Unidos para mudarse a un campus soleado en California y, básicamente, inventar el futuro.\n\nLo que produjeron en los primeros cinco años superó cualquier expectativa razonable. En 1973 construyeron el Alto, el primer ordenador personal con interfaz gráfica del mundo: ventanas, íconos, menús desplegables, papelera de reciclaje. La pantalla mostraba exactamente lo que se imprimiría — WYSIWYG, what you see is what you get. Para interactuar con ella inventaron el ratón.\n\nTambién inventaron Ethernet, la tecnología que permitiría conectar ordenadores en red y que es la base de internet tal como la conocemos. Inventaron los documentos de texto con formato visual, precursores directos de Word y todos los procesadores de texto modernos. Inventaron el láser para imprimir —la impresora láser. Cada uno de estos inventos habría sido suficiente para hacer la fortuna de una empresa.\n\nEl problema fue que Xerox no sabía qué hacer con nada de esto. La empresa era una máquina perfectamente optimizada para vender y mantener fotocopiadoras. Sus ejecutivos visitaban el PARC, veían las demostraciones, quedaban impresionados, y luego volvían a Rochester a seguir vendiendo fotocopiadoras. No podían imaginar el negocio que había detrás de esos inventos, porque ese negocio no existía todavía.\n\nEn diciembre de 1979, Steve Jobs visitó el PARC con un grupo de ingenieros de Apple. Era parte de un acuerdo por el cual Apple permitía a Xerox comprar acciones a precio preferencial a cambio de mostrarles sus investigaciones. Los ingenieros del PARC recibieron a los visitantes de Apple con cierta condescendencia: eran chicos de una empresa pequeña que hacía juguetes de consumo.\n\nLo que Jobs vio en esa visita lo cambió todo. La interfaz gráfica, el ratón, las ventanas. Años después, en una entrevista famosa, comparó la experiencia con la historia de un ladrón rico que roba a un vecino sin darse cuenta de que el vecino le había robado primero a otro. El Alto de Xerox también había tomado ideas de otros investigadores. Pero fue Jobs quien las convirtió en productos masivos.\n\nEl Macintosh, lanzado en 1984, puso la interfaz gráfica al alcance de los consumidores. Microsoft la copió para Windows. El mundo de la computación tal como lo conocemos hoy viene directamente de lo que los científicos del PARC inventaron entre 1970 y 1975 —y que Xerox no supo aprovechar.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Xerox_Alto_mit_Rechner.JPG/800px-Xerox_Alto_mit_Rechner.JPG"}, {"id": "world_14", "type": "world", "title": "Gengis Kan: El Constructor del Mayor Imperio de la Historia", "subtitle": "Asia Central, 1162-1227", "period": "1162-1227", "civilization": "Imperio Mongol", "imageQuery": "Genghis Khan Mongol Empire conquest Asia", "didYouKnow": "El Imperio Mongol en su apogeo cubría el 24% de la superficie terrestre del planeta y contenía el 25% de la población mundial. Era el mayor imperio contiguo de la historia. Gengis Kan murió sin que ningún enemigo lo hubiera derrotado en batalla.", "content": "Nació alrededor de 1162 en las estepas de Mongolia con el nombre de Temüjin. Su padre fue envenenado por enemigos cuando él tenía nueve años. Su familia fue abandonada en la estepa para morir por el clan que su padre había liderado. Temüjin pasó su infancia en la pobreza extrema, comiendo raíces y roedores para sobrevivir. En su adolescencia fue capturado y esclavizado. Escapó.\n\nDe ese comienzo imposible surgió el conquistador más exitoso de la historia humana.\n\nLo que hace notable a Gengis Kan no es solo la escala de sus conquistas sino la manera en que las logró. Los mongoles eran pastores nómadas sin ciudades, sin escritura propia, sin moneda, sin ejércitos permanentes antes de él. Temüjin tomó ese material humano disperso y fragmentado por siglos de guerras tribales y lo convirtió en la máquina militar más eficiente que el mundo haya conocido.\n\nSu innovación fundamental fue meritocrática: en lugar de asignar mandos militares por linaje o tribu, los asignó por capacidad. Los comandantes que ganaban batallas ascendían independientemente de su origen. Los que fallaban eran reemplazados. Era un principio radicalmente moderno aplicado en el siglo XII.\n\nSu caballería desarrolló tácticas que los ejércitos de su época no podían contrarrestar. La retirada fingida —avanzar, combatir, retirarse aparentando huida, atraer al enemigo hacia una emboscada preparada— era una táctica que los mongoles ejecutaban con una disciplina que ningún otro ejército de la época podía mantener, porque requería que los soldados ignoraran su instinto de perseguir al enemigo en retirada.\n\nLa diplomacia mongola tenía una simplicidad brutal: rendirse significaba incorporación al imperio con respeto para los líderes locales que colaboraban. Resistir significaba destrucción total. Samarcanda se rindió y floreció. Nishapur resistió y fue arrasada hasta el punto de que las fuentes dicen que hasta los gatos y los perros fueron muertos.\n\nGengis Kan conquistó China del Norte, Persia, Asia Central, partes de Europa del Este y el sur de Rusia. Sus hijos y nietos continuaron: conquistaron el resto de China, Polonia, Hungría, llegaron a las puertas de Viena. El Imperio Mongol se extendió desde el Pacífico hasta el Danubio.\n\nLo paradójico es que ese imperio de destrucción también creó algo: la Pax Mongolica, el período entre 1250 y 1350 aproximadamente, cuando la unidad mongola garantizó la seguridad de las rutas comerciales a través de Asia. Los mercaderes podían viajar desde China hasta el Mediterráneo con relativa seguridad. Fue en esas condiciones que Marco Polo realizó su viaje, y por esas rutas que la Peste Negra viajó hacia el oeste.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/YuanEmperorAlbumGenghisPortrait.jpg/800px-YuanEmperorAlbumGenghisPortrait.jpg"}, {"id": "world_15", "type": "world", "title": "Google: Dos Estudiantes, un Garaje y el Control de la Información", "subtitle": "Google Inc., 1998-presente", "period": "1998-presente", "civilization": "Google Inc.", "imageQuery": "Google founders Sergey Brin Larry Page Stanford 1998", "didYouKnow": "El nombre Google es un error ortográfico intencional de 'googol', el número matemático 1 seguido de 100 ceros. Los fundadores eligieron ese nombre para reflejar la misión de organizar la inmensa cantidad de información en internet. El primer servidor de Google funcionaba con discos duros guardados en cajas de LEGO.", "content": "En 1995, en el campus de la Universidad de Stanford, Larry Page y Sergey Brin se conocieron durante una visita de orientación para estudiantes de posgrado. Page tenía 22 años y venía de Michigan; Brin tenía 21 y era hijo de inmigrantes soviéticos. Según la leyenda, discutieron acaloradamente sobre casi todo en ese primer encuentro. Un año después estaban trabajando juntos en el proyecto que cambiaría internet.\n\nEn 1998, internet ya tenía motores de búsqueda: AltaVista, Yahoo, Excite. Pero el problema era la calidad de los resultados. Buscabas algo y la primera página estaba llena de spam, sitios optimizados para engañar a los motores de búsqueda, contenido irrelevante. Encontrar lo que realmente buscabas era frustrante.\n\nPage tuvo una intuición que en retrospectiva parece obvia pero que nadie había aplicado sistemáticamente: las páginas web más importantes son aquellas a las que más otras páginas enlazan. Era la lógica académica aplicada a internet —un paper científico es importante si otros papers lo citan. Un sitio web es importante si otros sitios lo enlazan.\n\nDesarrolló un algoritmo llamado PageRank que medía la importancia de cada página web en función de cuántos enlaces recibía y de la importancia de los sitios que enlazaban. El resultado era una jerarquía de relevancia que hacía que los mejores resultados aparecieran primero.\n\nEl proyecto era tan computacionalmente exigente que prácticamente consumió la capacidad de red de toda la Universidad de Stanford. El director del departamento de informática se quejó de que Page y Brin estaban usando el 50% del ancho de banda de toda la universidad para su proyecto de doctorado.\n\nEn septiembre de 1998, con un cheque de 100.000 dólares del inversor Andy Bechtolsheim —firmado antes de que Google ni siquiera existiera como empresa, porque Bechtolsheim tenía prisa y quería invertir antes de que Page y Brin cambiaran de idea— fundaron Google Inc. en el garaje de una casa en Menlo Park.\n\nEl crecimiento fue inmediato y explosivo. La calidad de los resultados de Google era tan superior a la competencia que los usuarios lo adoptaron masivamente sin necesidad de publicidad. Para 2000, Google procesaba 18 millones de búsquedas diarias. Para 2006, el verbo 'googlear' había sido añadido al diccionario Oxford.\n\nEl modelo de negocio llegó más tarde: los anuncios de texto relevantes junto a los resultados de búsqueda, que los usuarios clicaban voluntariamente porque eran pertinentes a lo que buscaban. Era publicidad que el usuario quería ver. La empresa que comenzó en un garaje se convirtió en una de las más valiosas del mundo.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Google_Campus.jpg/800px-Google_Campus.jpg"}, {"id": "world_16", "type": "world", "title": "La Gran Hambruna Irlandesa: Un Millón de Muertos y una Nación Dispersada", "subtitle": "Irlanda, 1845-1852", "period": "1845-1852", "civilization": "Irlanda bajo dominio británico", "imageQuery": "Irish Famine potato blight Ireland 1847 emigration", "didYouKnow": "Durante la Gran Hambruna, Irlanda siguió exportando enormes cantidades de alimentos a Gran Bretaña mientras su gente moría de hambre. En 1847, el año más mortífero, Irlanda exportó suficiente grano para alimentar a toda su población hambrienta. La decisión de continuar las exportaciones fue tomada por el gobierno británico.", "content": "En el otoño de 1845, los campesinos irlandeses notaron algo extraño en sus cultivos de papas: un olor a podredumbre, hojas que se volvían negras, tubérculos que se deshacían en una masa oscura y viscosa al desenterrarlos. El hongo Phytophthora infestans había llegado de América del Norte y estaba destruyendo la cosecha de papa en toda Irlanda.\n\nEra una catástrofe de una magnitud que las circunstancias específicas de Irlanda hacían especialmente devastadora. Un tercio de la población irlandesa —unos tres millones de personas— dependía casi exclusivamente de la papa para sobrevivir. Era el cultivo más productivo en términos de calorías por acre, y había permitido que Irlanda soportara una densidad de población extraordinaria en tierras que en su mayoría estaban bajo control de terratenientes ingleses ausentes.\n\nCuando la papa falló, los más pobres no tenían nada más. Y las circunstancias políticas y económicas convirtieron la hambruna natural en una catástrofe política.\n\nIrlanda era parte del Imperio Británico. El gobierno del primer ministro Lord John Russell aplicó los principios del laissez faire —la no intervención del Estado en la economía— con una rigidez que a muchos historiadores les parece incomprensible ante la escala del sufrimiento. Se establecieron trabajos públicos —los pobres debían trabajar en la construcción de caminos y diques a cambio de una paga mínima— pero los trabajadores estaban demasiado debilitados por el hambre para trabajar, y los salarios que ganaban no alcanzaban para comprar suficiente comida.\n\nMientras los irlandeses morían de hambre, los barcos continuaban llevando alimentos de Irlanda a Gran Bretaña. Cordero, buey, mantequilla, trigo, avena —los terratenientes seguían cobrando sus rentas y exportando lo que producían sus tierras. Cuando los arrendatarios no podían pagar, eran desalojados. Los desalojados no tenían adónde ir.\n\nLos caminos de Irlanda se llenaron de familias que caminaban hacia ningún lado, con los niños en brazos, buscando algo que comer. Los muertos comenzaron a aparecer en las cunetas, con la boca verde de haber comido hierba en su desesperación. Las workhouses —las casas de trabajo para pobres— se llenaron a rebosar con personas enfermas de cólera, disentería y fiebre tifoidea además de hambre.\n\nEntre 1845 y 1852, murió aproximadamente un millón de personas. Otro millón y medio emigró, en barcos que pronto fueron llamados 'barcos ataúd' por las condiciones miserables a bordo y la alta mortalidad en la travesía. La población de Irlanda cayó de 8 millones a 6 millones en siete años.\n\nLa emigración no terminó con la hambruna. Irlanda siguió vaciándose durante décadas. Para 1900, la isla que en 1845 tenía 8 millones de habitantes tenía solo 4 millones. Los descendientes de esos emigrantes —en Estados Unidos, Australia, Canadá, Argentina— son decenas de millones de personas. La diáspora irlandesa transformó la demografía de países enteros.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Famine_memorial_dublin.jpg/800px-Famine_memorial_dublin.jpg"}, {"id": "world_17", "type": "world", "title": "Sony y el Walkman: Cómo Japón Redefinió la Música", "subtitle": "Sony Corporation, 1979", "period": "1979", "civilization": "Sony Corporation, Japón", "imageQuery": "Sony Walkman 1979 portable music cassette player", "didYouKnow": "El Walkman fue inventado porque el cofundador de Sony, Masaru Ibuka, quería escuchar ópera en sus vuelos largos. Le pidió a los ingenieros que adaptaran un grabador de periodista existente para reproducir casetes con audífonos estéreo. La mayoría de los ejecutivos de Sony predijeron que sería un fracaso.", "content": "En 1978, Masaru Ibuka, cofundador de Sony y presidente honorario de la empresa, hizo una petición inusual a sus ingenieros. Viajaba frecuentemente en avión y quería poder escuchar sus óperas favoritas con buena calidad de sonido durante los vuelos. Los dispositivos existentes eran demasiado grandes y pesados, y los auriculares disponibles tenían sonido pobre.\n\nEl ingeniero Nobutoshi Kihara adaptó en pocas semanas el Pressman, un pequeño grabador de periodista que Sony fabricaba para reporteros, eliminando la función de grabación y añadiendo un sistema de reproducción estéreo con auriculares de mejor calidad. El resultado era pequeño, ligero, con buena autonomía de batería y un sonido excelente para su época.\n\nIbuka quedó encantado. Lo mostró a su socio Akio Morita, el presidente ejecutivo de Sony. Morita vio inmediatamente el potencial comercial: no era solo un gadget para un viejo melómano que viajaba en primera clase. Era algo que ningún producto de consumo había sido antes: música personal, portátil, con calidad de sonido real.\n\nEl equipo comercial de Sony era escéptico. Un reproductor sin función de grabación parecía un producto incompleto. Los grupos de foco —los estudios de mercado— arrojaban resultados negativos: los consumidores decían que no querían un reproductor sin grabadora, que no comprarían algo tan caro para escuchar música en la calle, que parecía raro caminar por ahí con auriculares.\n\nMorita ignoró los estudios de mercado. Era famoso por desconfiar de ellos para productos verdaderamente nuevos: 'Si le hubiera preguntado a la gente qué quería', dijo en otra ocasión parafraseando a Henry Ford, 'habrían dicho caballos más rápidos.'\n\nEl TPS-L2, que se vendería bajo el nombre Walkman, salió al mercado japonés el 1 de julio de 1979, al precio de 33.000 yenes, equivalente a unos 150 dólares de entonces. Las proyecciones internas de Sony eran de 5.000 unidades al mes. En dos meses se agotaron las existencias y la fábrica no podía producir lo suficiente.\n\nEl Walkman cambió la relación entre los seres humanos y la música. Por primera vez en la historia, una persona podía tener su banda sonora personal mientras caminaba por la calle, viajaba en metro, hacía ejercicio. La experiencia del espacio público se transformó: la gente empezó a moverse en su propia burbuja sonora, aislada voluntariamente del ruido ambiente.\n\nSony vendió 400 millones de Walkmans en sus diversas versiones hasta que el reproductor de CD y luego el iPod los hicieron obsoletos. El Walkman no solo fue un producto exitoso —redefinió lo que era posible en la relación entre la tecnología, la música y la vida cotidiana.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Original_Sony_Walkman_TPS-L2.jpg/800px-Original_Sony_Walkman_TPS-L2.jpg"}, {"id": "world_18", "type": "world", "title": "La Rebelión de los Cipayes: El Fin de la India de la Compañía", "subtitle": "India, 1857-1858", "period": "1857-1858", "civilization": "India bajo dominio de la Compañía Británica de las Indias Orientales", "imageQuery": "Indian Rebellion 1857 Sepoy Mutiny British India", "didYouKnow": "El detonante inmediato de la rebelión fue un rumor sobre el papel encerado de los nuevos cartuchos del rifle Enfield: para usarlos, los soldados debían morderlos, y el rumor decía que la grasa usada para impermeabilizarlos era de cerdo para los musulmanes y de vaca para los hindúes. La Compañía negó el rumor pero el daño ya estaba hecho.", "content": "La Compañía Británica de las Indias Orientales había comenzado como una empresa comercial y terminado gobernando el subcontinente más poblado del mundo. En 1857, controlaba directamente o a través de reyes títeres la mayor parte de la India, con un ejército de 300.000 hombres de los cuales 200.000 eran soldados indios —los cipayes— con apenas 40.000 europeos.\n\nDécadas de transformaciones forzadas habían generado una tensión creciente. La Compañía había abolido costumbres como el sati —el sacrificio de la viuda en la pira funeraria del esposo. Había permitido la conversión al cristianismo. Había introducido el telégrafo y los ferrocarriles. Había anexado reinos enteros cuando consideraba que sus gobernantes eran incompetentes o corruptos, negando a los príncipes indios el derecho a adoptar herederos —la doctrina de la caducidad.\n\nEn los cuarteles, los cipayes también tenían sus agravios. El salario era bajo. Los ascensos rara vez llegaban al grado de oficial para los soldados indios. Y en enero de 1857 comenzó a circular un rumor que golpeaba directamente las convicciones religiosas más profundas.\n\nLos nuevos rifles Enfield requerían cartuchos cubiertos de grasa para facilitar su carga. Los soldados debían morder la punta del cartucho antes de introducirlo. El rumor —que era en parte verdad— decía que la grasa usada era una mezcla de sebo de cerdo y de vaca. Para los soldados musulmanes, el cerdo era impuro. Para los hindúes, la vaca era sagrada. Ambos grupos consideraban que si el rumor era cierto, morder ese cartucho los contaminaría espiritualmente.\n\nLa Compañía intentó desmentir y calmar. No sirvió. En Meerut, el 10 de mayo de 1857, los cipayes se amotinaron, mataron a sus oficiales británicos y liberaron a los compañeros que habían sido encarcelados por negarse a usar los nuevos cartuchos. Marcharon hacia Delhi, donde el último rey mogol, Bahadur Shah Zafar, fue proclamado emperor de la India.\n\nLa rebelión se extendió rápidamente por el norte de la India: Lucknow, Kanpur, Jhansi. En Kanpur, tropas rebeldes masacraron a varios centenares de europeos y angloindios después de garantizarles el salvoconducto. En respuesta, los británicos que recuperaron la ciudad aplicaron represalias de una brutalidad extrema: condenados a muerte eran obligados a limpiar con la lengua la sangre de los pisos antes de ser ejecutados o cosidos vivos dentro de pieles de cerdo.\n\nLa rebelión fue aplastada en 1858 con una brutalidad que dejó cicatrices permanentes. Pero tuvo consecuencias institucionales enormes: el gobierno de la Compañía de las Indias Orientales fue disuelto. La Corona británica asumió el gobierno directo de la India. La reina Victoria fue proclamada emperatriz de la India en 1877. Y el movimiento independentista indio, que culminaría con Gandhi noventa años después, encontró en la rebelión de 1857 uno de sus mitos fundadores.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Indian_Mutiny_Newspaper.jpg/800px-Indian_Mutiny_Newspaper.jpg"}, {"id": "world_19", "type": "world", "title": "Nintendo: De los Naipes a la Conquista del Mundo", "subtitle": "Nintendo Co. Ltd., 1889-presente", "period": "1889-presente", "civilization": "Nintendo Co. Ltd., Japón", "imageQuery": "Nintendo history playing cards Game Boy Mario history Japan", "didYouKnow": "Nintendo fue fundada en 1889 para fabricar naipes hanafuda, utilizados en el juego tradicional japonés. Cuando el mercado de los naipes se saturó en los años 60, la empresa probó docenas de negocios distintos antes de encontrar los videojuegos, incluyendo una cadena de hoteles de amor y un servicio de taxis.", "content": "En 1889, Fusajiro Yamauchi fundó en Kyoto una pequeña empresa para fabricar hanafuda —los naipes de flores que se usaban en el juego tradicional japonés del mismo nombre. Los naipes eran de excelente calidad, fabricados a mano con corteza de árbol especialmente tratada. El negocio prosperó.\n\nNinety años después, la empresa que ese anciano artesano había fundado salvaría a la industria de los videojuegos y crearía los personajes más reconocibles del mundo del entretenimiento. La historia del camino entre esos dos puntos es una de las más inusuales del mundo empresarial.\n\nDespués de la Segunda Guerra Mundial, bajo el liderazgo de Hiroshi Yamauchi, bisnieto del fundador, Nintendo comenzó a buscar cómo hacer crecer el negocio más allá de los naipes. Probó el juego del taxi. Probó el hotel de amor —los famosos 'love hotels' japoneses para parejas que buscan privacidad. Probó la distribución de arroz instantáneo. Nada funcionó bien.\n\nEn los años 60, Nintendo empezó a fabricar juguetes. Fue su primer éxito fuera de los naipes: el Ultrahand, un brazo extensible de plástico que podía recoger objetos, vendió 1,2 millones de unidades. Luego llegaron otros juguetes exitosos. La empresa tenía algo que sabía hacer bien: hacer que los niños se divirtieran.\n\nEl salto a los videojuegos llegó con los arcades —las máquinas tragamonedas de juego— a finales de los años 70. Nintendo licenció Radar Scope de una empresa norteamericana y envió 3.000 unidades a Estados Unidos. Fue un fracaso. Para salvar la inversión, Yamauchi le pidió a un joven diseñador de 24 años llamado Shigeru Miyamoto que creara un juego nuevo usando las 3.000 máquinas que nadie quería.\n\nMiyamoto no había hecho videojuegos antes. Pero era artista, músico y fanático de los cómics. Creó Donkey Kong en 1981: un gorila enorme que lanzaba barriles desde lo alto de una estructura de metal mientras un pequeño carpintero llamado Jumpman —luego Mario— trataba de rescatar a una chica. Era simple, físicamente satisfactorio y tremendamente adictivo. Fue un éxito enorme.\n\nCon las ganancias de Donkey Kong, Nintendo desarrolló la NES —Nintendo Entertainment System— lanzada en Japón en 1983 y en Estados Unidos en 1985, justo después del colapso del mercado de videojuegos que había destruido a Atari. Nintendo resucitó una industria entera con una combinación de hardware asequible, control estricto de calidad sobre los juegos publicados y personajes que se convertirían en iconos culturales globales: Mario, Link de Zelda, Pikachu.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nintendo-Entertainment-System-NES-Console-FL.jpg/800px-Nintendo-Entertainment-System-NES-Console-FL.jpg"}, {"id": "world_20", "type": "world", "title": "La Expedición de Shackleton: Sobrevivir a lo Imposible", "subtitle": "Antártida, 1914-1916", "period": "1914-1916", "civilization": "Expedición Imperial Transantártica británica", "imageQuery": "Shackleton Endurance Antarctica ice expedition 1915", "didYouKnow": "Ernest Shackleton reclutó a los miembros de su expedición con un anuncio que decía: 'Se buscan hombres para viaje peligroso. Sueldo bajo. Frío extremo. Meses de oscuridad total. Peligro constante. Retorno incierto. Honor y reconocimiento en caso de éxito.' Recibió más de 5.000 respuestas.", "content": "El 1 de agosto de 1914, el barco Endurance salió de Londres con el destino más remoto del mundo: la Antártida. Su misión era completar la primera travesía a pie del continente polar, desde el Mar de Weddell hasta el Mar de Ross, cruzando el Polo Sur. Era la última gran aventura de exploración polar que quedaba por hacer.\n\nEl jefe de la expedición era Ernest Shackleton, un explorador irlandés de 40 años con experiencia antártica previa y una reputación de liderazgo en condiciones extremas. Había reclutado 27 hombres con la promesa de una aventura sin precedentes.\n\nLo que siguió no fue la aventura prometida. Fue algo mucho más extraordinario.\n\nEn enero de 1915, cuando el Endurance intentaba navegar hacia la costa antártica, quedó atrapado en el hielo del Mar de Weddell. El barco estaba completamente inmovilizado. No había forma de liberarlo. Los hombres esperaron meses mientras el barco crujía bajo la presión del hielo en expansión.\n\nEn octubre de 1915, la presión del hielo comenzó a destrozar el casco del Endurance. El agua entró. El barco se hundió el 21 de noviembre de 1915. Los 28 hombres estaban ahora en el hielo, en uno de los entornos más hostiles del planeta, sin barco, a miles de kilómetros de cualquier asentamiento humano, con el invierno antártico acercándose.\n\nSalvaron tres pequeños botes salvavidas del barco antes de que se hundiera. Durante cinco meses vivieron en el hielo, esperando que la corriente los llevara hacia tierra. La moral del grupo era el recurso más valioso que tenían, y Shackleton lo administró con una maestría que sus biógrafos estudiarían durante el siglo siguiente.\n\nCuando el hielo comenzó a deshacerse en abril de 1916, botaron los tres botes y navegaron por aguas antárticas en condiciones espantosas hasta llegar a la isla Elefante —la primera tierra que pisaban en 497 días. Pero la isla estaba deshabitada y era demasiado remota para que cualquier rescate la encontrara.\n\nShackleton tomó la decisión más audaz de una expedición llena de decisiones audaces: con cinco hombres y el bote más grande, llamado James Caird, navegaría 1.300 kilómetros a través del mar más tormentoso del mundo, el Océano Antártico, hasta la isla de Georgia del Sur, donde había una estación ballenera.\n\nLa travesía duró 17 días en condiciones que los marineros modernos consideran prácticamente imposibles de sobrevivir en un bote abierto de 6 metros. Llegaron a la costa rocosa de Georgia del Sur, pero en el lado equivocado: la estación ballenera estaba del otro lado de montañas que nadie había cruzado antes.\n\nShackleton y dos hombres cruzaron la isla a pie en 36 horas continuas, sin dormir, sin mapas, sin equipo de montaña. Llegaron a la estación ballenera de Stromness. Los balleneros que los vieron llegar, con sus ropas harapientas y sus caras irreconocibles bajo meses de suciedad y hielo, no los reconocieron hasta que Shackleton habló.\n\nCuatro meses después, Shackleton regresó a la isla Elefante a rescatar a los 22 hombres que había dejado atrás. Estaban todos vivos. En toda la expedición, que duró casi dos años y los sometió a condiciones que habrían matado a cualquier grupo menos cohesionado, no murió ni un solo hombre.", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Endurance_icebound.jpg/800px-Endurance_icebound.jpg"}];

var LABELS = {bible:"&#10013; Escrituras", argentina:"&#9789; Argentina", world:"&#9678; El Mundo"};
var LABELS_PLAIN = {bible:"Escrituras", argentina:"Argentina", world:"El Mundo"};

var state = {
  todayStories: {bible:null, argentina:null, world:null},
  favorites: [], history: [], currentStory: null, theme:"dark",
  currentSection: null
};

try {
  var saved = JSON.parse(localStorage.getItem("cronicas_v6") || "{}");
  state.favorites = saved.favorites || [];
  state.history   = saved.history   || [];
  state.theme     = saved.theme     || "dark";
  if(saved.date === new Date().toDateString()) {
    state.todayStories = saved.todayStories || state.todayStories;
  }
} catch(e) {}

function save() {
  try {
    localStorage.setItem("cronicas_v6", JSON.stringify({
      date: new Date().toDateString(),
      todayStories: state.todayStories,
      favorites: state.favorites,
      history: state.history,
      theme: state.theme
    }));
  } catch(e) {}
}

// THEME
if(state.theme === "light") {
  document.body.classList.add("light");
  document.getElementById("btn-theme").innerHTML = "&#9790;";
}
document.getElementById("btn-theme").addEventListener("click", function() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  document.body.classList.toggle("light");
  document.getElementById("btn-theme").innerHTML = state.theme === "light" ? "&#9790;" : "&#9728;";
  save();
});

// FULLSCREEN
document.getElementById("btn-fullscreen").addEventListener("click", function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
});

// DATE
var today = new Date();
var ds = today.toLocaleDateString("es-AR", {weekday:"long", day:"numeric", month:"long", year:"numeric"});
document.getElementById("home-date").textContent = ds.charAt(0).toUpperCase() + ds.slice(1);

// DAILY STORY PICKER
function getDailyStory(type) {
  if (state.todayStories[type]) return state.todayStories[type];
  var pool = ALL_STORIES.filter(function(s){ return s.type === type; });
  var seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  var offsets = {bible:0, argentina:7, world:13};
  var idx = (seed + offsets[type]) % pool.length;
  var story = JSON.parse(JSON.stringify(pool[idx]));
  story.dateGenerated = today.toLocaleDateString("es-AR", {day:"numeric", month:"long", year:"numeric"});
  state.todayStories[type] = story;
  save();
  return story;
}

// Set previews
["bible","argentina","world"].forEach(function(type) {
  var s = getDailyStory(type);
  document.getElementById("preview-" + type).textContent = s.title;
});

// CARD CLICKS — usando addEventListener en lugar de onclick
document.getElementById("card-bible").addEventListener("click", function(){ openSection("bible"); });
document.getElementById("card-argentina").addEventListener("click", function(){ openSection("argentina"); });
document.getElementById("card-world").addEventListener("click", function(){ openSection("world"); });
document.getElementById("btn-favorites").addEventListener("click", function(){ openSection("favorites"); });
document.getElementById("btn-history").addEventListener("click", function(){ openSection("history"); });
document.getElementById("btn-back").addEventListener("click", goHome);
document.getElementById("btn-reader-back").addEventListener("click", closeReader);
document.getElementById("reader-fav-btn").addEventListener("click", toggleReaderFav);

// NAVIGATION
function goHome() {
  document.getElementById("home-view").style.display = "flex";
  document.getElementById("section-view").style.display = "none";
  document.getElementById("reader-view").style.display = "none";
  document.body.style.overflow = "";
}

function openSection(type) {
  state.currentSection = type;
  document.getElementById("home-view").style.display = "none";
  document.getElementById("section-view").style.display = "block";
  document.getElementById("reader-view").style.display = "none";

  var labelsNav = {bible:"&#10013; Escrituras", argentina:"&#9789; Argentina", world:"&#9678; El Mundo", favorites:"&#9829; Favoritos", history:"&#9672; Archivo"};
  document.getElementById("section-topbar-title").innerHTML = labelsNav[type] || type;

  var content = document.getElementById("section-content");

  if (type === "favorites") { renderGrid(state.favorites, content, "&#9825;", "Todav&#237;a no guardaste historias como favoritas."); return; }
  if (type === "history")   { renderGrid(dedup(state.history), content, "&#9672;", "Tu archivo est&#225; vac&#237;o."); return; }

  var story = getDailyStory(type);
  if (!state.history.find(function(h){ return h.id === story.id; })) {
    state.history.unshift(story);
    if (state.history.length > 60) state.history = state.history.slice(0, 60);
    save();
  }
  renderCard(type, story, content);
}

function renderCard(type, story, container) {
  var isFav = state.favorites.some(function(f){ return f.id === story.id; });
  var excerpt = story.content.substring(0, 260).replace(/
/g, " ") + "...";
  var imgHtml = story.image ? '<img src="' + story.image + '" alt="" style="width:100%;max-height:280px;object-fit:cover;display:block;border-bottom:1px solid var(--border)" onerror="this.style.display='none'">' : "";
  
  container.innerHTML = '<div class="story-card">' + imgHtml +
    '<div class="story-card-inner">' +
    '<div class="story-card-meta"><span class="story-tag">' + LABELS_PLAIN[type] + '</span><span class="story-date">' + (story.dateGenerated||"") + '</span></div>' +
    '<div class="story-title">' + story.title + '</div>' +
    '<div class="story-subtitle">' + story.subtitle + '</div>' +
    '<div class="story-excerpt">' + excerpt + '</div>' +
    '<div class="story-actions">' +
    '<button class="btn-read" id="btn-read-story">Leer Historia</button>' +
    '<button class="btn-fav ' + (isFav?"active":"") + '" id="btn-fav-card">&#9829;</button>' +
    '<button class="btn-new" id="btn-next-story">&#8635; Siguiente</button>' +
    '</div></div></div>';

  document.getElementById("btn-read-story").addEventListener("click", function(){ openReader(type); });
  document.getElementById("btn-fav-card").addEventListener("click", function(){ toggleFavCard(type); });
  document.getElementById("btn-next-story").addEventListener("click", function(){ nextStory(type); });
}

function nextStory(type) {
  var pool = ALL_STORIES.filter(function(s){ return s.type === type; });
  var cur = state.todayStories[type];
  var curIdx = pool.findIndex(function(s){ return s.id === cur.id; });
  var nextIdx = (curIdx + 1) % pool.length;
  var story = JSON.parse(JSON.stringify(pool[nextIdx]));
  story.dateGenerated = today.toLocaleDateString("es-AR", {day:"numeric", month:"long", year:"numeric"});
  state.todayStories[type] = story;
  if (!state.history.find(function(h){ return h.id === story.id; })) {
    state.history.unshift(story);
    if (state.history.length > 60) state.history = state.history.slice(0, 60);
  }
  save();
  renderCard(type, story, document.getElementById("section-content"));
}

function openReader(type) {
  var s = state.todayStories[type];
  if (s) renderReader(s);
}

function renderReader(story) {
  state.currentStory = story;
  var isFav = state.favorites.some(function(f){ return f.id === story.id; });
  var paras = story.content.split(/

+/).filter(function(p){ return p.trim(); });
  var html = "";
  paras.forEach(function(p, i) {
    if (i === 2 && story.image) {
      html += '<img src="' + story.image + '" alt="" class="reader-inline-img" onerror="this.style.display='none'">';
      html += '<div class="reader-img-caption">' + story.subtitle + '</div>';
    }
    html += "<p>" + p.trim() + "</p>";
  });

  var refBlock = "";
  if (story.book) {
    refBlock = '<div class="reader-reference"><strong>Referencia B&#237;blica</strong>' + story.book + '</div>';
  } else if (story.period) {
    var ctx = story.type === "argentina" ? "Per&#237;odo Hist&#243;rico" : "Contexto";
    refBlock = '<div class="reader-reference"><strong>' + ctx + '</strong>' + story.period + (story.civilization ? " &middot; " + story.civilization : "") + '</div>';
  }

  var dykBlock = story.didYouKnow ? '<div class="did-you-know"><div class="did-you-know-label">&#191;Sab&#237;as que...?</div><p>' + story.didYouKnow + '</p></div>' : "";
  var catLabel = LABELS_PLAIN[story.type] || story.type;
  var imgHero = story.image ? '<img src="' + story.image + '" alt="" class="reader-hero-img" onerror="this.classList.add('hidden')">' : "";

  document.getElementById("reader-body").innerHTML =
    '<div class="reader-category">' + catLabel + '</div>' +
    '<h1 class="reader-title">' + story.title + '</h1>' +
    '<div class="reader-subtitle">' + story.subtitle + '</div>' +
    imgHero +
    '<div class="reader-content">' + html + '</div>' +
    refBlock + dykBlock +
    '<div class="reader-end-ornament">&#10022; &#10022; &#10022;</div>';

  document.getElementById("reader-fav-btn").classList.toggle("active", isFav);
  document.getElementById("reader-progress").textContent = story.dateGenerated || "";
  document.getElementById("reader-view").style.display = "block";
  document.getElementById("reader-view").scrollTop = 0;
  document.body.style.overflow = "hidden";
}

function closeReader() {
  document.getElementById("reader-view").style.display = "none";
  document.body.style.overflow = "";
}

function toggleReaderFav() {
  if (!state.currentStory) return;
  var s = state.currentStory;
  var isFav = state.favorites.some(function(f){ return f.id === s.id; });
  if (isFav) {
    state.favorites = state.favorites.filter(function(f){ return f.id !== s.id; });
    document.getElementById("reader-fav-btn").classList.remove("active");
    showToast("Eliminado de favoritos");
  } else {
    state.favorites.unshift(s);
    document.getElementById("reader-fav-btn").classList.add("active");
    showToast("Guardado en favoritos &#9829;");
  }
  save();
}

function toggleFavCard(type) {
  var story = state.todayStories[type];
  if (!story) return;
  var isFav = state.favorites.some(function(f){ return f.id === story.id; });
  if (isFav) {
    state.favorites = state.favorites.filter(function(f){ return f.id !== story.id; });
    showToast("Eliminado de favoritos");
  } else {
    state.favorites.unshift(story);
    showToast("Guardado en favoritos &#9829;");
  }
  save();
  renderCard(type, story, document.getElementById("section-content"));
}

function renderGrid(items, container, emptyIcon, emptyText) {
  if (!items.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">' + emptyIcon + '</div><p>' + emptyText + '</p></div>';
    return;
  }
  var cards = items.map(function(s) {
    return '<div class="grid-card" data-id="' + s.id + '">' +
      '<div class="grid-card-tag">' + (LABELS_PLAIN[s.type]||s.type) + '</div>' +
      '<div class="grid-card-title">' + s.title + '</div>' +
      '<div class="grid-card-sub">' + (s.subtitle||"") + '</div>' +
      '<div class="grid-card-date">' + (s.dateGenerated||"") + '</div>' +
      '</div>';
  });
  container.innerHTML = '<div class="grid-view">' + cards.join("") + '</div>';
  container.querySelectorAll(".grid-card").forEach(function(el) {
    el.addEventListener("click", function() {
      openArchiveStory(el.getAttribute("data-id"));
    });
  });
}

function openArchiveStory(id) {
  var s = state.favorites.find(function(f){ return f.id === id; }) ||
          state.history.find(function(h){ return h.id === id; }) ||
          ALL_STORIES.find(function(x){ return x.id === id; });
  if (s) renderReader(s);
}

function dedup(arr) {
  return arr.filter(function(s, i, a){ return a.findIndex(function(x){ return x.id === s.id; }) === i; });
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.innerHTML = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2600);
}

// PWA INSTALL
var deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem("install_dismissed")) {
    document.getElementById("install-banner").classList.add("visible");
  }
});
document.getElementById("install-btn").addEventListener("click", function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) {
    deferredPrompt = null;
    document.getElementById("install-banner").classList.remove("visible");
    if (r.outcome === "accepted") showToast("&#161;App instalada!");
  });
});
document.getElementById("install-dismiss").addEventListener("click", function() {
  localStorage.setItem("install_dismissed", "1");
  document.getElementById("install-banner").classList.remove("visible");
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
